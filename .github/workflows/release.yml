name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Rust tests
        run: cargo test --workspace
      - name: Build relay binaries
        run: cargo build -p pike-server -p pike
      - name: Relay smoke
        run: python3 scripts/local_tunnel_smoke.py
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Rust format
        run: cargo fmt --all -- --check

  build:
    name: Build - ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pike-linux-amd64
            server_name: pike-server-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pike-linux-arm64
            server_name: pike-server-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: pike-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: pike-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: pike-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install --locked cargo-zigbuild
      - name: Install cmake and go
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake golang-go
      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p pike -p pike-server
      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p pike -p pike-server
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pike ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/pike.exe ${{ matrix.name }}
      - name: Package server bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p server-bundle
          cp target/${{ matrix.target }}/release/pike-server server-bundle/pike-server
          cp deploy/README.md server-bundle/README.md
          cp deploy/server-vps.toml server-bundle/server-vps.toml
          cp deploy/setup.sh server-bundle/setup.sh
          cp deploy/start.sh server-bundle/start.sh
          cp deploy/pike-server.service server-bundle/pike-server.service
          tar -czf ${{ matrix.server_name }} -C server-bundle .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
      - name: Upload server artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server_name }}
          path: ${{ matrix.server_name }}

  container:
    name: Publish Container
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/a3therion/pike-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    needs: [build, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
